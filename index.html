<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compta Cours de Maths</title>
  <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    // localStorage shim for window.storage
    window.storage = {
      get: async (key) => {
        const value = localStorage.getItem(key);
        return value ? { value } : null;
      },
      set: async (key, value) => {
        localStorage.setItem(key, value);
      },
    };

    const { useState, useEffect, useCallback, useMemo } = React;

// ════════════════════════════════════════════
// STORAGE
// ════════════════════════════════════════════
const KEYS = {
  clients: "mc-clients",
  eleves: "mc-eleves",
  seances: "mc-seances",
  historique: "mc-historique",
  meta: "mc-meta",
};

async function load(key, fallback) {
  try {
    const r = await window.storage.get(key);
    return r ? JSON.parse(r.value) : fallback;
  } catch { return fallback; }
}
async function save(key, data) {
  try { await window.storage.set(key, JSON.stringify(data)); }
  catch (e) { console.error("Erreur stockage:", e); }
}

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

// ════════════════════════════════════════════
// DATE / TIME HELPERS
// ════════════════════════════════════════════
const pad = (n) => String(n).padStart(2, "0");
const now = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
};
const JOURS = ["Dimanche", "Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];
const MOIS_NOMS = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

function formatDateLong(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  return `${JOURS[dt.getDay()]} ${d} ${MOIS_NOMS[m - 1]} ${y}`;
}
function formatDateShort(dateStr) {
  if (!dateStr) return "";
  const [y, m, d] = dateStr.split("-");
  return `${d}/${m}/${y}`;
}
function formatHeure(h) {
  if (!h) return "";
  const [hh, mm] = h.split(":");
  return mm === "00" ? `${parseInt(hh)}h` : `${parseInt(hh)}h${mm}`;
}
function calcDureeHeures(debut, fin) {
  if (!debut || !fin) return 0;
  const [h1, m1] = debut.split(":").map(Number);
  const [h2, m2] = fin.split(":").map(Number);
  return Math.max(0, (h2 * 60 + m2 - h1 * 60 - m1) / 60);
}
function formatDuree(heures) {
  if (!heures || heures <= 0) return "0h";
  const h = Math.floor(heures);
  const m = Math.round((heures - h) * 60);
  if (m === 0) return `${h}h`;
  if (h === 0) return `${m}min`;
  return `${h}h${pad(m)}`;
}
function getMonthKey(dateStr) { return dateStr ? dateStr.slice(0, 7) : ""; }
function getYear(dateStr) { return dateStr ? dateStr.slice(0, 4) : ""; }
function formatTimestamp(ts) {
  if (!ts) return "Jamais";
  const d = new Date(ts);
  return `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()} à ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

const eur = (n) => new Intl.NumberFormat("fr-FR", { style: "currency", currency: "EUR" }).format(n || 0);

// ════════════════════════════════════════════
// TABS
// ════════════════════════════════════════════
const TABS = [
  { id: "accueil", label: "Accueil", icon: "🏠" },
  { id: "dettes", label: "Dettes", icon: "💶" },
  { id: "stats", label: "Statistiques", icon: "📊" },
  { id: "clients", label: "Clients", icon: "👥" },
];

// ════════════════════════════════════════════
// THEME
// ════════════════════════════════════════════
const T = {
  bg: "#0b0e14",
  surface: "#141820",
  card: "#1a1f2b",
  border: "#262d3d",
  borderFocus: "#4a7cff",
  primary: "#4a7cff",
  primarySoft: "#4a7cff22",
  success: "#2dd4a0",
  successSoft: "#2dd4a020",
  warning: "#f0b429",
  warningSoft: "#f0b42920",
  danger: "#ef6461",
  dangerSoft: "#ef646120",
  accent: "#b07cff",
  text: "#e4e8f1",
  textSec: "#8b95a8",
  textMut: "#5a6478",
  white: "#ffffff",
};

// ════════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════════
function App() {
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("accueil");
  const [clients, setClients] = useState([]);
  const [eleves, setEleves] = useState([]);
  const [seances, setSeances] = useState([]);
  const [historique, setHistorique] = useState([]);
  const [meta, setMeta] = useState({ lastModified: null });
  const [modal, setModal] = useState(null);
  const [toast, setToast] = useState(null);

  useEffect(() => {
    (async () => {
      const [c, e, s, h, m] = await Promise.all([
        load(KEYS.clients, []), load(KEYS.eleves, []),
        load(KEYS.seances, []), load(KEYS.historique, []),
        load(KEYS.meta, { lastModified: null }),
      ]);
      setClients(c); setEleves(e); setSeances(s); setHistorique(h); setMeta(m);
      setLoading(false);
    })();
  }, []);

  const saveClients = useCallback((d) => { setClients(d); save(KEYS.clients, d); }, []);
  const saveEleves = useCallback((d) => { setEleves(d); save(KEYS.eleves, d); }, []);
  const saveSeances = useCallback((d) => {
    setSeances(d); save(KEYS.seances, d);
    const m = { lastModified: Date.now() };
    setMeta(m); save(KEYS.meta, m);
  }, []);
  const saveHistorique = useCallback((d) => { setHistorique(d); save(KEYS.historique, d); }, []);

  const showToast = useCallback((msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  }, []);

  const getClient = useCallback((id) => clients.find(c => c.id === id), [clients]);
  const getEleve = useCallback((id) => eleves.find(e => e.id === id), [eleves]);
  const getElevesOfClient = useCallback((cid) => eleves.filter(e => e.clientId === cid), [eleves]);

  const currentMonth = getMonthKey(now());
  const currentYear = getYear(now());

  const monthSeances = useMemo(() => seances.filter(s => getMonthKey(s.date) === currentMonth), [seances, currentMonth]);
  const monthCA = useMemo(() => {
    let t = 0;
    monthSeances.forEach(s => s.participants.forEach(p => { t += p.montant || 0; }));
    return t;
  }, [monthSeances]);
  const monthHeures = useMemo(() => monthSeances.reduce((a, s) => a + calcDureeHeures(s.heureDebut, s.heureFin), 0), [monthSeances]);

  const dettesParClient = useMemo(() => {
    const map = {};
    clients.forEach(c => {
      if (c.detteInitiale > 0) {
        if (!map[c.id]) map[c.id] = { montant: 0, seancesImpayes: [] };
        map[c.id].montant += c.detteInitiale;
      }
    });
    seances.forEach(s => {
      s.participants.forEach(p => {
        if (!p.encaisse) {
          const el = eleves.find(e => e.id === p.eleveId);
          if (el) {
            if (!map[el.clientId]) map[el.clientId] = { montant: 0, seancesImpayes: [] };
            map[el.clientId].montant += p.montant || 0;
            map[el.clientId].seancesImpayes.push({ ...p, seanceId: s.id, date: s.date, heureDebut: s.heureDebut, heureFin: s.heureFin, matiere: s.matiere });
          }
        }
      });
    });
    return map;
  }, [clients, eleves, seances]);

  const totalDettes = useMemo(() => Object.values(dettesParClient).reduce((a, d) => a + d.montant, 0), [dettesParClient]);

  // ── CRUD ──
  const handleSaveClient = useCallback((data, editId) => {
    if (editId) {
      saveClients(clients.map(c => c.id === editId ? { ...c, ...data } : c));
      showToast("Client modifié");
    } else {
      const nc = { id: uid(), ...data, detteInitiale: data.detteInitiale || 0 };
      saveClients([...clients, nc]);
      if (data.estAdulte) {
        saveEleves([...eleves, { id: uid(), clientId: nc.id, prenom: data.nom }]);
      }
      showToast("Client ajouté");
    }
    setModal(null);
  }, [clients, eleves, saveClients, saveEleves, showToast]);

  const handleDeleteClient = useCallback((id) => {
    const cEleves = eleves.filter(e => e.clientId === id);
    const eIds = cEleves.map(e => e.id);
    if (seances.some(s => s.participants.some(p => eIds.includes(p.eleveId)))) {
      showToast("Impossible : ce client a des séances", "danger"); return;
    }
    saveEleves(eleves.filter(e => e.clientId !== id));
    saveClients(clients.filter(c => c.id !== id));
    showToast("Client supprimé"); setModal(null);
  }, [clients, eleves, seances, saveClients, saveEleves, showToast]);

  const handleSaveEleve = useCallback((data, editId) => {
    if (editId) {
      saveEleves(eleves.map(e => e.id === editId ? { ...e, ...data } : e));
      showToast("Élève modifié");
    } else {
      saveEleves([...eleves, { id: uid(), ...data }]);
      showToast("Élève ajouté");
    }
    setModal(null);
  }, [eleves, saveEleves, showToast]);

  const handleDeleteEleve = useCallback((id) => {
    if (seances.some(s => s.participants.some(p => p.eleveId === id))) {
      showToast("Impossible : cet élève a des séances", "danger"); return;
    }
    saveEleves(eleves.filter(e => e.id !== id));
    showToast("Élève supprimé");
  }, [eleves, seances, saveEleves, showToast]);

  const handleSaveSeance = useCallback((data, editId) => {
    if (editId) {
      saveSeances(seances.map(s => s.id === editId ? { ...s, ...data } : s));
      showToast("Séance modifiée");
    } else {
      saveSeances([...seances, { id: uid(), ...data }]);
      showToast("Séance enregistrée");
    }
    setModal(null);
  }, [seances, saveSeances, showToast]);

  const handleDeleteSeance = useCallback((id) => {
    saveSeances(seances.filter(s => s.id !== id));
    showToast("Séance supprimée"); setModal(null);
  }, [seances, saveSeances, showToast]);

  const handleEncaisser = useCallback((seanceId, eleveId) => {
    saveSeances(seances.map(s =>
      s.id === seanceId ? { ...s, participants: s.participants.map(p => p.eleveId === eleveId ? { ...p, encaisse: true } : p) } : s
    ));
    showToast("Paiement encaissé ✓");
  }, [seances, saveSeances, showToast]);

  const handleEncaisserDetteInitiale = useCallback((cid) => {
    saveClients(clients.map(c => c.id === cid ? { ...c, detteInitiale: 0 } : c));
    showToast("Dette initiale soldée ✓");
  }, [clients, saveClients, showToast]);

  const handleSaveHistorique = useCallback((data) => {
    const idx = historique.findIndex(h => h.annee === data.annee && h.mois === data.mois);
    const updated = idx >= 0 ? historique.map((h, i) => i === idx ? data : h) : [...historique, data];
    saveHistorique(updated);
    showToast("Données enregistrées"); setModal(null);
  }, [historique, saveHistorique, showToast]);

  const generateSMS = useCallback((clientId) => {
    const client = getClient(clientId);
    const dette = dettesParClient[clientId];
    if (!client || !dette || dette.seancesImpayes.length === 0) return "";

    const lines = [];
    const parMatiere = {};

    dette.seancesImpayes.sort((a, b) => a.date.localeCompare(b.date)).forEach(si => {
      const el = getEleve(si.eleveId);
      const duree = calcDureeHeures(si.heureDebut, si.heureFin);
      lines.push(`${formatDateLong(si.date)}, de ${formatHeure(si.heureDebut)} à ${formatHeure(si.heureFin)}, ${formatDuree(duree)} avec ${el?.prenom || "?"}. ${eur(si.montant)}.`);
      const mat = si.matiere || "Maths";
      parMatiere[mat] = (parMatiere[mat] || 0) + (si.montant || 0);
    });

    let sms = lines.join("\n") + "\n";
    const matieres = Object.keys(parMatiere);
    if (matieres.length > 1) {
      sms += "\n";
      matieres.forEach(mat => { sms += `Total ${mat} : ${eur(parMatiere[mat])}.\n`; });
    }
    sms += `\nTotal dû : ${eur(dette.montant)}.`;
    return sms;
  }, [dettesParClient, getClient, getEleve]);

  if (loading) return (
    <div style={{ background: T.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans', sans-serif" }}>
      <div style={{ textAlign: "center", color: T.textSec }}>
        <div style={{ fontSize: 36, marginBottom: 8 }}>📐</div>Chargement...
      </div>
    </div>
  );

  const ctx = {
    clients, eleves, seances, historique, meta,
    getClient, getEleve, getElevesOfClient,
    dettesParClient, totalDettes, monthCA, monthHeures, currentMonth, currentYear,
    handleSaveClient, handleDeleteClient, handleSaveEleve, handleDeleteEleve,
    handleSaveSeance, handleDeleteSeance, handleEncaisser, handleEncaisserDetteInitiale,
    handleSaveHistorique, generateSMS, setModal, showToast,
  };

  return (
    <div style={{ background: T.bg, minHeight: "100vh", fontFamily: "'DM Sans', sans-serif", color: T.text, paddingBottom: 80 }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: ${T.border}; border-radius: 3px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: ${T.borderFocus} !important; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        button { font-family: inherit; }
        button:active { transform: scale(0.97); }
      `}</style>

      <header style={{ background: T.surface, borderBottom: `1px solid ${T.border}`, padding: "14px 18px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 100 }} role="banner">
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 22 }} role="img" aria-label="Maths">📐</span>
          <span style={{ fontSize: 18, fontWeight: 700 }}>Maths Cours</span>
        </div>
        <div style={{ fontSize: 11, color: T.textMut }}>{clients.length} client{clients.length !== 1 ? "s" : ""}</div>
      </header>

      <main style={{ padding: 16, maxWidth: 600, margin: "0 auto" }} role="main">
        {tab === "accueil" && <TabAccueil {...ctx} />}
        {tab === "dettes" && <TabDettes {...ctx} />}
        {tab === "stats" && <TabStats {...ctx} />}
        {tab === "clients" && <TabClients {...ctx} />}
      </main>

      <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: T.surface, borderTop: `1px solid ${T.border}`, display: "flex", zIndex: 100 }} role="tablist" aria-label="Navigation principale">
        {TABS.map(t => (
          <button key={t.id} role="tab" aria-selected={tab === t.id} aria-label={t.label}
            onClick={() => setTab(t.id)}
            style={{
              flex: 1, padding: "8px 4px 12px", background: "none", border: "none",
              color: tab === t.id ? T.primary : T.textMut, cursor: "pointer",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
              borderTop: tab === t.id ? `2px solid ${T.primary}` : "2px solid transparent",
              transition: "all 0.2s",
            }}>
            <span style={{ fontSize: 18 }}>{t.icon}</span>
            <span style={{ fontSize: 10, fontWeight: tab === t.id ? 600 : 400 }}>{t.label}</span>
          </button>
        ))}
      </nav>

      {modal?.type === "seance" && <ModalSeance edit={modal.data} ctx={ctx} onClose={() => setModal(null)} />}
      {modal?.type === "client" && <ModalClient edit={modal.data} ctx={ctx} onClose={() => setModal(null)} />}
      {modal?.type === "eleve" && <ModalEleve clientId={modal.clientId} edit={modal.data} ctx={ctx} onClose={() => setModal(null)} />}
      {modal?.type === "confirm" && <ModalConfirm message={modal.message} onConfirm={modal.onConfirm} onClose={() => setModal(null)} />}
      {modal?.type === "sms" && <ModalSMS text={modal.text} onClose={() => setModal(null)} />}
      {modal?.type === "historique" && <ModalHistorique edit={modal.data} ctx={ctx} onClose={() => setModal(null)} />}
      {modal?.type === "detailClient" && <ModalDetailClient clientId={modal.clientId} ctx={ctx} onClose={() => setModal(null)} />}

      {toast && (
        <div role="alert" style={{
          position: "fixed", bottom: 90, left: "50%", transform: "translateX(-50%)",
          background: toast.type === "danger" ? T.danger : T.success,
          color: T.white, padding: "10px 22px", borderRadius: 12,
          fontWeight: 600, fontSize: 13, zIndex: 300, whiteSpace: "nowrap",
          boxShadow: "0 4px 24px rgba(0,0,0,0.5)", animation: "toastIn 0.3s ease",
        }}>{toast.msg}</div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════
// COMPOSANTS PARTAGÉS
// ════════════════════════════════════════════
const Card = ({ children, style, ...props }) => (
  <div style={{ background: T.card, borderRadius: 14, border: `1px solid ${T.border}`, padding: 16, marginBottom: 10, ...style }} {...props}>{children}</div>
);
const Btn = ({ children, color = T.primary, full, small, outline, style, ...props }) => (
  <button style={{
    background: outline ? "transparent" : color, color: outline ? color : T.white,
    border: outline ? `1.5px solid ${color}` : "none",
    borderRadius: 10, padding: small ? "6px 12px" : "10px 18px",
    fontWeight: 600, fontSize: small ? 12 : 14, cursor: "pointer",
    width: full ? "100%" : "auto", display: "inline-flex", alignItems: "center",
    justifyContent: "center", gap: 6, transition: "all 0.2s", ...style
  }} {...props}>{children}</button>
);
const Badge = ({ children, color = T.primary }) => (
  <span style={{ background: `${color}20`, color, padding: "2px 10px", borderRadius: 20, fontSize: 11, fontWeight: 600, display: "inline-flex", alignItems: "center", gap: 4 }}>{children}</span>
);
const Input = ({ label, style, ...props }) => (
  <div style={{ marginBottom: 12 }}>
    {label && <label style={{ fontSize: 12, fontWeight: 600, color: T.textSec, marginBottom: 6, display: "block" }}>{label}</label>}
    <input aria-label={label} style={{ width: "100%", padding: "10px 14px", background: T.bg, border: `1.5px solid ${T.border}`, borderRadius: 10, color: T.text, fontSize: 14, boxSizing: "border-box", ...style }} {...props} />
  </div>
);
const Select = ({ label, children, style, ...props }) => (
  <div style={{ marginBottom: 12 }}>
    {label && <label style={{ fontSize: 12, fontWeight: 600, color: T.textSec, marginBottom: 6, display: "block" }}>{label}</label>}
    <select aria-label={label || "Sélectionner"} style={{ width: "100%", padding: "10px 14px", background: T.bg, border: `1.5px solid ${T.border}`, borderRadius: 10, color: T.text, fontSize: 14, boxSizing: "border-box", cursor: "pointer", ...style }} {...props}>{children}</select>
  </div>
);
const Row = ({ children, style }) => <div style={{ display: "flex", gap: 10, ...style }}>{children}</div>;
const Empty = ({ icon, text }) => (
  <div style={{ textAlign: "center", padding: "36px 20px", color: T.textMut }}>
    <div style={{ fontSize: 32, marginBottom: 8 }}>{icon}</div>
    <div style={{ fontSize: 13 }}>{text}</div>
  </div>
);
function Overlay({ children, onClose }) {
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", backdropFilter: "blur(4px)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 200, animation: "fadeIn 0.2s ease" }}>
      <div onClick={e => e.stopPropagation()} role="dialog" style={{ background: T.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 500, maxHeight: "88vh", overflowY: "auto", padding: 20, border: `1px solid ${T.border}`, animation: "slideUp 0.3s ease" }}>
        {children}
      </div>
    </div>
  );
}
const ModalTitle = ({ children }) => <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 16 }}>{children}</h2>;

// ════════════════════════════════════════════
// TAB ACCUEIL
// ════════════════════════════════════════════
function TabAccueil({ meta, monthCA, monthHeures, totalDettes, currentMonth, seances, setModal }) {
  const prixMoyen = monthHeures > 0 ? monthCA / monthHeures : 0;

  // Dernières séances
  const dernieres = useMemo(() =>
    seances.sort((a, b) => (b.date + b.heureDebut).localeCompare(a.date + a.heureDebut)).slice(0, 5),
    [seances]
  );

  return (
    <div>
      <Btn full color={T.primary} onClick={() => setModal({ type: "seance" })}
        style={{ padding: "14px 20px", fontSize: 16, marginBottom: 16, borderRadius: 14 }}>
        + Enregistrer une séance
      </Btn>

      <Card style={{ textAlign: "center", padding: 12 }}>
        <div style={{ fontSize: 11, color: T.textMut }}>Dernière modification</div>
        <div style={{ fontSize: 13, fontWeight: 600, color: T.textSec, marginTop: 2 }}>{formatTimestamp(meta.lastModified)}</div>
      </Card>

      <Card>
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 14, color: T.textSec }}>
          📅 {MOIS_NOMS[parseInt(currentMonth.split("-")[1]) - 1]} {currentMonth.split("-")[0]}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div style={{ background: T.primarySoft, borderRadius: 12, padding: 14, border: `1px solid ${T.primary}30` }}>
            <div style={{ fontSize: 22, fontWeight: 700, color: T.primary }}>{eur(monthCA)}</div>
            <div style={{ fontSize: 11, color: T.textSec }}>Chiffre d'affaires</div>
          </div>
          <div style={{ background: T.successSoft, borderRadius: 12, padding: 14, border: `1px solid ${T.success}30` }}>
            <div style={{ fontSize: 22, fontWeight: 700, color: T.success }}>{formatDuree(monthHeures)}</div>
            <div style={{ fontSize: 11, color: T.textSec }}>Heures effectuées</div>
          </div>
          <div style={{ background: T.warningSoft, borderRadius: 12, padding: 14, border: `1px solid ${T.warning}30` }}>
            <div style={{ fontSize: 22, fontWeight: 700, color: T.warning }}>{eur(totalDettes)}</div>
            <div style={{ fontSize: 11, color: T.textSec }}>Total dettes</div>
          </div>
          <div style={{ background: `${T.accent}15`, borderRadius: 12, padding: 14, border: `1px solid ${T.accent}30` }}>
            <div style={{ fontSize: 22, fontWeight: 700, color: T.accent }}>{eur(prixMoyen)}</div>
            <div style={{ fontSize: 11, color: T.textSec }}>Prix moyen / h</div>
          </div>
        </div>
      </Card>

      {dernieres.length > 0 && (
        <Card>
          <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>🕐 Dernières séances</div>
          {dernieres.map(s => {
            const duree = calcDureeHeures(s.heureDebut, s.heureFin);
            const total = s.participants.reduce((a, p) => a + (p.montant || 0), 0);
            const allPaid = s.participants.every(p => p.encaisse);
            return (
              <div key={s.id} style={{ padding: "8px 0", borderBottom: `1px solid ${T.border}`, cursor: "pointer" }}
                onClick={() => setModal({ type: "seance", data: s })}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 12, color: T.textSec }}>{formatDateShort(s.date)} • {formatHeure(s.heureDebut)}-{formatHeure(s.heureFin)} • {formatDuree(duree)}</div>
                    <div style={{ fontSize: 13, fontWeight: 500, marginTop: 2 }}>{s.matiere || "Maths"} — {eur(total)}</div>
                  </div>
                  <Badge color={allPaid ? T.success : T.warning}>{allPaid ? "Encaissé" : "Impayé"}</Badge>
                </div>
              </div>
            );
          })}
        </Card>
      )}
    </div>
  );
}

          {totalDettes > 0 ? eur(totalDettes) : "Aucune dette ✓"}

      {clientsAvecDettes.length === 0 ? (

                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${T.border}` }}>
                  <div>
                    <div style={{ fontSize: 12, color: T.textSec }}>Dette initiale</div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: T.warning }}>{eur(c.detteInitiale)}</div>
                  </div>
                  <Btn small color={T.success} onClick={() => handleEncaisserDetteInitiale(c.id)} aria-label={`Encaisser dette initiale de ${c.nom}`}>Encaisser</Btn>
                </div>

              {dette.seancesImpayes.map((si, i) => {

                        {si.matiere && si.matiere !== "Maths" && <Badge color={T.accent}>{si.matiere}</Badge>}

                    <Btn small color={T.success} onClick={() => handleEncaisser(si.seanceId, si.eleveId)} aria-label={`Encaisser ${eur(si.montant)}`}>Encaisser</Btn>

              <div style={{ marginTop: 10 }}>
                <Btn small outline color={T.primary} full onClick={() => setModal({ type: "sms", text: generateSMS(c.id) })} aria-label={`Générer SMS pour ${c.nom}`}>
                  📱 Générer SMS récapitulatif
                </Btn>
              </div>
            </Card>
          );
        })
      )}
    </div>
  );
}

// TAB STATISTIQUES
// ════════════════════════════════════════════
function TabStats({ seances, historique, currentYear, setModal }) {
  const [selectedYear, setSelectedYear] = useState(currentYear);

  const years = useMemo(() => {
    const s = new Set();
    seances.forEach(se => s.add(getYear(se.date)));
    historique.forEach(h => s.add(String(h.annee)));
    s.add(currentYear);
    return [...s].sort().reverse();
  }, [seances, historique, currentYear]);

  const monthData = useMemo(() => {
    const data = [];
    for (let m = 1; m <= 12; m++) {
      const mk = `${selectedYear}-${pad(m)}`;
      const mSeances = seances.filter(s => getMonthKey(s.date) === mk);
      let ca = 0;
      mSeances.forEach(s => s.participants.forEach(p => { ca += p.montant || 0; }));
      let heures = mSeances.reduce((a, s) => a + calcDureeHeures(s.heureDebut, s.heureFin), 0);

      const hist = historique.find(h => h.annee === parseInt(selectedYear) && h.mois === m);
      if (hist) { ca += hist.ca || 0; heures += hist.heures || 0; }

      data.push({ mois: m, label: MOIS_NOMS[m - 1], ca, heures, prixMoyen: heures > 0 ? ca / heures : 0, hasData: ca > 0 || heures > 0 });
    }
    return data;
  }, [seances, historique, selectedYear]);

  const totalCA = monthData.reduce((a, m) => a + m.ca, 0);
  const totalHeures = monthData.reduce((a, m) => a + m.heures, 0);
  const prixMoyenAnnuel = totalHeures > 0 ? totalCA / totalHeures : 0;
  const maxCA = Math.max(...monthData.map(m => m.ca), 1);

  return (
    <div>
      <Row style={{ marginBottom: 14, alignItems: "center" }}>
        <Select value={selectedYear} onChange={e => setSelectedYear(e.target.value)} style={{ flex: 1, marginBottom: 0 }}>
          {years.map(y => <option key={y} value={y}>{y}</option>)}
        </Select>
        <Btn small outline color={T.primary} onClick={() => setModal({ type: "historique", data: { annee: parseInt(selectedYear) } })} aria-label="Saisir des données historiques">
          + Historique
        </Btn>
      </Row>

      <Card style={{ background: `linear-gradient(135deg, ${T.card} 0%, ${T.primary}10 100%)` }}>
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 12, color: T.textSec }}>📊 Totaux {selectedYear}</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, textAlign: "center" }}>
          <div>
            <div style={{ fontSize: 20, fontWeight: 700, color: T.primary }}>{eur(totalCA)}</div>
            <div style={{ fontSize: 10, color: T.textSec }}>CA</div>
          </div>
          <div>
            <div style={{ fontSize: 20, fontWeight: 700, color: T.success }}>{formatDuree(totalHeures)}</div>
            <div style={{ fontSize: 10, color: T.textSec }}>Heures</div>
          </div>
          <div>
            <div style={{ fontSize: 20, fontWeight: 700, color: T.accent }}>{eur(prixMoyenAnnuel)}</div>
            <div style={{ fontSize: 10, color: T.textSec }}>Moy. / h</div>
          </div>
        </div>
      </Card>

      <Card>
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 12 }}>📈 CA mensuel</div>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 100 }}>
          {monthData.map(m => (
            <div key={m.mois} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", height: "100%" }}>
              <div style={{ flex: 1, display: "flex", alignItems: "flex-end", width: "100%" }}>
                <div style={{
                  width: "100%", background: m.hasData ? `linear-gradient(to top, ${T.primary}, ${T.primary}aa)` : `${T.border}50`,
                  borderRadius: "3px 3px 0 0", height: `${Math.max(m.ca / maxCA * 100, 3)}%`,
                  transition: "height 0.4s ease",
                }} aria-label={`${m.label}: ${eur(m.ca)}`}></div>
              </div>
              <div style={{ fontSize: 8, color: T.textMut, marginTop: 3 }}>{m.label.slice(0, 3)}</div>
            </div>
          ))}
        </div>
      </Card>

      <Card>
        <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>Détail par mois</div>
        {monthData.map(m => (
          <div key={m.mois} style={{
            display: "flex", justifyContent: "space-between", alignItems: "center",
            padding: "8px 0", borderBottom: `1px solid ${T.border}`,
            opacity: m.hasData ? 1 : 0.35,
          }}>
            <span style={{ fontSize: 13, fontWeight: 500, minWidth: 85 }}>{m.label}</span>
            <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
              <span style={{ fontSize: 12, color: T.success, fontFamily: "'DM Mono', monospace" }}>{formatDuree(m.heures)}</span>
              <span style={{ fontSize: 12, color: T.primary, fontWeight: 600, fontFamily: "'DM Mono', monospace", minWidth: 65, textAlign: "right" }}>{eur(m.ca)}</span>
              <span style={{ fontSize: 11, color: T.accent, fontFamily: "'DM Mono', monospace", minWidth: 55, textAlign: "right" }}>{m.prixMoyen > 0 ? `${eur(m.prixMoyen)}/h` : "—"}</span>
            </div>
          </div>
        ))}
      </Card>
    </div>
  );
}

// MODAL SÉANCE
// ════════════════════════════════════════════
function ModalSeance({ edit, ctx, onClose }) {
  const { eleves, getClient } = ctx;
  const [type, setType] = useState(edit?.type || "individuel");
  const [date, setDate] = useState(edit?.date || now());
  const [heureDebut, setHeureDebut] = useState(edit?.heureDebut || "");
  const [heureFin, setHeureFin] = useState(edit?.heureFin || "");
  const [matiere, setMatiere] = useState(edit?.matiere || "Maths");
  const [participants, setParticipants] = useState(edit?.participants || []);
  const [step, setStep] = useState(edit ? 2 : 0);

  const allEleves = useMemo(() =>
    eleves.map(e => { const c = getClient(e.clientId); return { ...e, clientNom: c?.nom || "?", tarifDefaut: c?.tarifDefaut || 0 }; }),
    [eleves, getClient]
  );

  const addP = (eid) => {
    if (participants.find(p => p.eleveId === eid)) return;
    const el = allEleves.find(e => e.id === eid);
    setParticipants([...participants, { eleveId: eid, montant: el?.tarifDefaut || 0, encaisse: false }]);
  };
  const removeP = (eid) => setParticipants(participants.filter(p => p.eleveId !== eid));
  const updateP = (eid, f, v) => setParticipants(participants.map(p => p.eleveId === eid ? { ...p, [f]: v } : p));

  const duree = calcDureeHeures(heureDebut, heureFin);
  const canSave = date && heureDebut && heureFin && duree > 0 && participants.length > 0 && participants.every(p => p.montant > 0);

  return (
    <Overlay onClose={onClose}>
      <ModalTitle>{edit ? "Modifier la séance" : "Nouvelle séance"}</ModalTitle>

      {step === 0 && !edit && (
        <div>
          <div style={{ fontSize: 13, color: T.textSec, marginBottom: 14 }}>Type de séance</div>
          <Row>
            <Btn full color={type === "individuel" ? T.primary : T.textMut} onClick={() => { setType("individuel"); setParticipants([]); }}
              style={{ padding: 16, borderRadius: 14 }}>👤 Individuelle</Btn>
            <Btn full color={type === "groupe" ? T.primary : T.textMut} onClick={() => { setType("groupe"); setParticipants([]); }}
              style={{ padding: 16, borderRadius: 14 }}>👥 Groupée</Btn>
          </Row>
          <Btn full color={T.primary} onClick={() => setStep(1)} style={{ marginTop: 16 }}>Suivant →</Btn>
        </div>
      )}

      {step === 1 && !edit && (
        <div>
          <Input label="Date" type="date" value={date} onChange={e => setDate(e.target.value)} />
          <Row>
            <div style={{ flex: 1 }}><Input label="Heure début" type="time" value={heureDebut} onChange={e => setHeureDebut(e.target.value)} /></div>
            <div style={{ flex: 1 }}><Input label="Heure fin" type="time" value={heureFin} onChange={e => setHeureFin(e.target.value)} /></div>
          </Row>
          {duree > 0 && <div style={{ fontSize: 13, color: T.success, marginBottom: 8 }}>Durée : {formatDuree(duree)}</div>}
          <Select label="Matière" value={matiere} onChange={e => setMatiere(e.target.value)}>
            <option value="Maths">Maths</option>
            <option value="Français">Français</option>
            <option value="Anglais">Anglais</option>
            <option value="Droit">Droit</option>
            <option value="Autre">Autre</option>
          </Select>
          <Row>
            <Btn outline color={T.textSec} onClick={() => setStep(0)}>← Retour</Btn>
            <Btn full color={T.primary} onClick={() => setStep(2)} style={{ opacity: heureDebut && heureFin && duree > 0 ? 1 : 0.4 }}>Suivant →</Btn>
          </Row>
        </div>
      )}

      {(step === 2 || edit) && (
        <div>
          {edit && (
            <>
              <Input label="Date" type="date" value={date} onChange={e => setDate(e.target.value)} />
              <Row>
                <div style={{ flex: 1 }}><Input label="Heure début" type="time" value={heureDebut} onChange={e => setHeureDebut(e.target.value)} /></div>
                <div style={{ flex: 1 }}><Input label="Heure fin" type="time" value={heureFin} onChange={e => setHeureFin(e.target.value)} /></div>
              </Row>
              <Select label="Matière" value={matiere} onChange={e => setMatiere(e.target.value)}>
                <option value="Maths">Maths</option>
                <option value="Français">Français</option>
                <option value="Anglais">Anglais</option>
                <option value="Droit">Droit</option>
                <option value="Autre">Autre</option>
              </Select>
            </>
          )}

          {!edit && (
            <div style={{ fontSize: 13, color: T.textSec, marginBottom: 10 }}>
              {formatDateLong(date)} • {formatHeure(heureDebut)} → {formatHeure(heureFin)} ({formatDuree(duree)}) • {matiere}
            </div>
          )}

          <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Élève{type === "groupe" ? "s" : ""} :</div>

          {(type === "groupe" || participants.length === 0) && allEleves.length > 0 && (
            <Select onChange={e => { if (e.target.value) { addP(e.target.value); e.target.value = ""; } }}>
              <option value="">+ Ajouter un élève...</option>
              {allEleves.filter(e => !participants.find(p => p.eleveId === e.id)).map(e => (
                <option key={e.id} value={e.id}>{e.prenom} ({e.clientNom})</option>
              ))}
            </Select>
          )}

          {participants.map(p => {
            const el = allEleves.find(e => e.id === p.eleveId);
            return (
              <div key={p.eleveId} style={{ background: T.bg, borderRadius: 10, padding: 12, marginBottom: 8, border: `1px solid ${T.border}` }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <span style={{ fontWeight: 600, fontSize: 14 }}>{el?.prenom || "?"} <span style={{ color: T.textMut, fontWeight: 400, fontSize: 12 }}>({el?.clientNom})</span></span>
                  {(type === "groupe" || participants.length > 1) && (
                    <button onClick={() => removeP(p.eleveId)} style={{ background: "none", border: "none", color: T.danger, cursor: "pointer", fontSize: 16 }} aria-label={`Retirer ${el?.prenom}`}>✕</button>
                  )}
                </div>
                <Row>
                  <div style={{ flex: 1 }}>
                    <Input label="Montant (€)" type="number" value={p.montant}
                      onChange={e => updateP(p.eleveId, "montant", parseFloat(e.target.value) || 0)}
                      style={{ marginBottom: 0 }} />
                  </div>
                  <div style={{ display: "flex", alignItems: "flex-end" }}>
                    <Btn small color={p.encaisse ? T.success : T.warning}
                      onClick={() => updateP(p.eleveId, "encaisse", !p.encaisse)}
                      aria-label={p.encaisse ? "Marqué encaissé" : "Marqué différé"}>
                      {p.encaisse ? "✓ Encaissé" : "⏳ Différé"}
                    </Btn>
                  </div>
                </Row>
              </div>
            );
          })}

          {allEleves.length === 0 && (
            <div style={{ fontSize: 13, color: T.warning, textAlign: "center", padding: 16 }}>
              Ajoutez d'abord un client et ses élèves dans l'onglet Clients.
            </div>
          )}

          <Row style={{ marginTop: 16 }}>
            {!edit && <Btn outline color={T.textSec} onClick={() => setStep(1)}>← Retour</Btn>}
            {edit && <Btn outline color={T.textSec} onClick={onClose}>Annuler</Btn>}
            <Btn full color={canSave ? T.primary : T.textMut} onClick={() => canSave && ctx.handleSaveSeance({ type, date, heureDebut, heureFin, matiere, participants }, edit?.id)}
              style={{ cursor: canSave ? "pointer" : "not-allowed" }}>
              {edit ? "Enregistrer" : "Valider la séance"}
            </Btn>
          </Row>

          {edit && (
            <Btn full outline color={T.danger} onClick={() => ctx.setModal({
              type: "confirm", message: "Supprimer cette séance ?",
              onConfirm: () => ctx.handleDeleteSeance(edit.id)
            })} style={{ marginTop: 10 }}>
              Supprimer cette séance
            </Btn>
          )}
        </div>
      )}
    </Overlay>
  );
}

      <Row>
        <Btn outline color={T.textSec} onClick={onClose}>Annuler</Btn>
        <Btn full color={valid ? T.primary : T.textMut} onClick={() => valid && ctx.handleSaveClient({ nom, tarifDefaut, detteInitiale, estAdulte }, edit?.id)}
          style={{ cursor: valid ? "pointer" : "not-allowed" }}>
          {edit ? "Enregistrer" : "Ajouter"}
        </Btn>
      </Row>
    </Overlay>
  );
}

// ════════════════════════════════════════════
// MODAL ÉLÈVE
// ════════════════════════════════════════════
function ModalEleve({ clientId, edit, ctx, onClose }) {
  const [prenom, setPrenom] = useState(edit?.prenom || "");
  const valid = prenom.trim();

  return (
    <Overlay onClose={onClose}>
      <ModalTitle>{edit ? "Modifier l'élève" : "Nouvel élève"}</ModalTitle>
      <Input label="Prénom" value={prenom} onChange={e => setPrenom(e.target.value)} placeholder="Ex : Djibril" />
      <Row>
        <Btn outline color={T.textSec} onClick={onClose}>Annuler</Btn>
        <Btn full color={valid ? T.primary : T.textMut} onClick={() => valid && ctx.handleSaveEleve({ prenom, clientId }, edit?.id)}
          style={{ cursor: valid ? "pointer" : "not-allowed" }}>
          {edit ? "Enregistrer" : "Ajouter"}
        </Btn>
      </Row>
    </Overlay>
  );
}

// ════════════════════════════════════════════
// MODAL DETAIL CLIENT
// ════════════════════════════════════════════
function ModalDetailClient({ clientId, ctx, onClose }) {
  const client = ctx.getClient(clientId);
  const cEleves = ctx.getElevesOfClient(clientId);
  if (!client) return null;

  const eIds = cEleves.map(e => e.id);
  const cSeances = ctx.seances.filter(s => s.participants.some(p => eIds.includes(p.eleveId)))
    .sort((a, b) => b.date.localeCompare(a.date));

  return (
    <Overlay onClose={onClose}>
      <ModalTitle>{client.nom}</ModalTitle>
      <div style={{ marginBottom: 14 }}>
        <Badge color={T.primary}>{eur(client.tarifDefaut)}/séance</Badge>
      </div>

      <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>Élèves ({cEleves.length})</div>
      {cEleves.map(e => (
        <div key={e.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 0", borderBottom: `1px solid ${T.border}` }}>
          <span style={{ fontSize: 14 }}>{e.prenom}</span>
          <div style={{ display: "flex", gap: 4 }}>
            <button onClick={() => ctx.setModal({ type: "eleve", clientId, data: e })} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16 }} aria-label={`Modifier ${e.prenom}`}>✏️</button>
            <button onClick={() => ctx.setModal({
              type: "confirm", message: `Supprimer ${e.prenom} ?`,
              onConfirm: () => { ctx.handleDeleteEleve(e.id); ctx.setModal({ type: "detailClient", clientId }); }
            })} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 16 }} aria-label={`Supprimer ${e.prenom}`}>🗑️</button>
          </div>
        </div>
      ))}
      <Btn small outline color={T.primary} onClick={() => ctx.setModal({ type: "eleve", clientId })} style={{ marginTop: 8, marginBottom: 16 }}>
        + Ajouter un élève
      </Btn>

      <div style={{ fontSize: 13, fontWeight: 700, marginBottom: 8 }}>Dernières séances</div>
      {cSeances.length === 0 ? (
        <div style={{ fontSize: 12, color: T.textMut, padding: "8px 0" }}>Aucune séance</div>
      ) : (
        cSeances.slice(0, 10).map(s => {
          const duree = calcDureeHeures(s.heureDebut, s.heureFin);
          const pClient = s.participants.filter(p => eIds.includes(p.eleveId));
          return (
            <div key={s.id} style={{ padding: "8px 0", borderBottom: `1px solid ${T.border}`, cursor: "pointer" }}
              onClick={() => ctx.setModal({ type: "seance", data: s })}>
              <div style={{ fontSize: 12, color: T.textSec }}>
                {formatDateShort(s.date)} • {formatHeure(s.heureDebut)}-{formatHeure(s.heureFin)} • {formatDuree(duree)}
              </div>
              {pClient.map(p => {
                const el = ctx.getEleve(p.eleveId);
                return (
                  <div key={p.eleveId} style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginTop: 2 }}>
                    <span>{el?.prenom} — {eur(p.montant)}</span>
                    <Badge color={p.encaisse ? T.success : T.warning}>{p.encaisse ? "Encaissé" : "Différé"}</Badge>
                  </div>
                );
              })}
            </div>
          );
        })
      )}

      <Row style={{ marginTop: 16 }}>
        <Btn outline color={T.textSec} onClick={onClose}>Fermer</Btn>
        <Btn small color={T.primary} onClick={() => ctx.setModal({ type: "client", data: client })}>✏️ Modifier</Btn>
        <Btn small color={T.danger} onClick={() => ctx.setModal({
          type: "confirm", message: `Supprimer ${client.nom} et ses élèves ?`,
          onConfirm: () => ctx.handleDeleteClient(clientId)
        })}>🗑️</Btn>
      </Row>
    </Overlay>
  );
}

// ════════════════════════════════════════════
// MODAL SMS
// ════════════════════════════════════════════
function ModalSMS({ text, onClose }) {
  const [copied, setCopied] = useState(false);
  const handleCopy = async () => {
    try {
      await navigator.clipboard.writeText(text);
    } catch {
      const ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
    }
    setCopied(true);
    setTimeout(() => setCopied(false), 2000);
  };

  return (
    <Overlay onClose={onClose}>
      <ModalTitle>SMS récapitulatif</ModalTitle>
      <div style={{ background: T.bg, borderRadius: 10, padding: 14, border: `1px solid ${T.border}`, marginBottom: 14, whiteSpace: "pre-wrap", fontSize: 13, lineHeight: 1.6 }}>
        {text || "Aucune donnée à afficher."}
      </div>
      <Row>
        <Btn outline color={T.textSec} onClick={onClose}>Fermer</Btn>
        <Btn full color={copied ? T.success : T.primary} onClick={handleCopy}>
          {copied ? "✓ Copié !" : "📋 Copier le message"}
        </Btn>
      </Row>
    </Overlay>
  );
}

// ════════════════════════════════════════════
// MODAL HISTORIQUE
// ════════════════════════════════════════════
function ModalHistorique({ edit, ctx, onClose }) {
  const [annee, setAnnee] = useState(edit?.annee || parseInt(ctx.currentYear));
  const [mois, setMois] = useState(edit?.mois || 1);
  const [ca, setCa] = useState(0);
  const [heures, setHeures] = useState(0);

  useEffect(() => {
    const existing = ctx.historique.find(h => h.annee === annee && h.mois === mois);
    if (existing) { setCa(existing.ca); setHeures(existing.heures); }
    else { setCa(0); setHeures(0); }
  }, [annee, mois, ctx.historique]);

  return (
    <Overlay onClose={onClose}>
      <ModalTitle>Données historiques</ModalTitle>
      <div style={{ fontSize: 12, color: T.textSec, marginBottom: 14 }}>Saisie manuelle de données passées (CA et heures)</div>
      <Row>
        <div style={{ flex: 1 }}>
          <Input label="Année" type="number" value={annee} onChange={e => setAnnee(parseInt(e.target.value) || 2025)} />
        </div>
        <div style={{ flex: 1 }}>
          <Select label="Mois" value={mois} onChange={e => setMois(parseInt(e.target.value))}>
            {MOIS_NOMS.map((n, i) => <option key={i} value={i + 1}>{n}</option>)}
          </Select>
        </div>
      </Row>
      <Input label="Chiffre d'affaires (€)" type="number" value={ca} onChange={e => setCa(parseFloat(e.target.value) || 0)} />
      <Input label="Heures effectuées" type="number" step="0.5" value={heures} onChange={e => setHeures(parseFloat(e.target.value) || 0)} />
      <Row>
        <Btn outline color={T.textSec} onClick={onClose}>Annuler</Btn>
        <Btn full color={T.primary} onClick={() => ctx.handleSaveHistorique({ annee, mois, ca, heures })}>Enregistrer</Btn>
      </Row>
    </Overlay>
  );
}

// ════════════════════════════════════════════
// MODAL CONFIRM
// ════════════════════════════════════════════
function ModalConfirm({ message, onConfirm, onClose }) {
  return (
    <Overlay onClose={onClose}>
      <div style={{ textAlign: "center", padding: "10px 0" }}>
        <div style={{ fontSize: 32, marginBottom: 12 }}>⚠️</div>
        <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 20 }}>{message}</div>
        <Row style={{ justifyContent: "center" }}>
          <Btn outline color={T.textSec} onClick={onClose}>Annuler</Btn>
          <Btn color={T.danger} onClick={() => { onConfirm(); onClose(); }}>Supprimer</Btn>
        </Row>
      </div>
    </Overlay>
  );
}

    root.render(<App />);
  </script>
